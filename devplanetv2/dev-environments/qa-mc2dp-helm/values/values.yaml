workspace-proxy:
  enabled: true
  deploymentNamespace: qa-mc2dp-helm
  workspaceNamespace: jupyter-pods-qa-prometheus
  kubernetesApiServerCIDRs:
    - "10.100.0.1/32"       # kubernetes ClusterIP (pre-DNAT)
    - "172.27.140.0/22"     # EKS private subnet (DHCP)
    - "172.27.136.0/22"     # EKS private subnet (DHCP)
    - "172.27.132.0/22"     # EKS private subnet (DHCP)

  replicaCount: 1

  image:
    repository: quay.io/cdis/multihead-workspace-proxy
    tag: feat_init
    pullPolicy: Always

  listenAddr: ":8080"
  jegKernelSpecPolicy: |
    {
      "allowedSpecs": [
        "python_kubernetes",
        "python_tensorflow_kubernetes",
        "python_tensorflow_gpu_kubernetes"
      ]
    }

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  networkPolicy:
    enabled: true

jeg:
  enabled: true
  workspaceNamespace: jupyter-pods-qa-prometheus

  replicaCount: 1

  image:
    repository: quay.io/cdis/gen3-vectis
    tag: "qa-jegv2"
    pullPolicy: Always

  env:
    # CRITICAL: must match hatchery user-namespace and workspace-proxy WORKSPACE_NAMESPACE.
    EG_NAMESPACE: jupyter-pods-qa-prometheus
    EG_KERNEL_LAUNCH_TIMEOUT: "120"
    EG_MAX_KERNELS_PER_USER: "2"
    EG_CULL_IDLE_TIMEOUT: "14400"
    EG_CULL_CONNECTED: "True"
    EG_AUTH_TOKEN: ""
    EG_DEFAULT_KERNEL_NAME: python3
    EG_LIST_KERNELS: "True"
    EG_KERNEL_IMAGE_PULL_POLICY: IfNotPresent
    EG_SHARED_NAMESPACE: "True"
    EG_MIRROR_WORKING_DIRS: "False"
    EG_KERNEL_SPEC_POLICY: |
      {
        "default_kernel_name": "python3",
        "kernel_specs": {
          "python3": {
            "display_name": "Python (Micro — Local)",
            "language": "python"
          },
          "python_kubernetes": {
            "display_name": "Python on Kubernetes",
            "language": "python",
            "image_name": "elyra/kernel-py:latest",
            "resources": {
              "cpu": "2",
              "memory": "4Gi",
              "gpu_type": "none"
            }
          },
          "python_tensorflow_kubernetes": {
            "display_name": "Python on Kubernetes with TensorFlow",
            "language": "python",
            "image_name": "elyra/kernel-py-tensorflow:latest",
            "resources": {
              "cpu": "1",
              "memory": "4Gi",
              "gpu_type": "none"
            }
          },
          "python_tensorflow_gpu_kubernetes": {
            "display_name": "Python on Kubernetes with TensorFlow with GPUs",
            "language": "python",
            "image_name": "elyra/kernel-py-tensorflow:latest",
            "resources": {
              "cpu": "2",
              "memory": "8Gi",
              "gpu_type": "NVIDIA"
            }
          },
          "r_kubernetes": {
            "display_name": "R on Kubernetes",
            "language": "r",
            "image_name": "elyra/kernel-r:latest"
          }
        }
      }

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
