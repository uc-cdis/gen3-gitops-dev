          container:
              cpu-limit: "1"
              env:
                  - name: GEN3_HOSTNAME
                    valueFrom:
                        configMapKeyRef:
                            key: hostname
                            name: manifest-global
              image: quay.io/cdis/manifest-indexing:2023.05
              memory-limit: 1Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /creds.json
                    name: sower-jobs-creds-volume
                    readOnly: true
                    subPath: creds.json
          name: manifest-indexing
          restart_policy: Never
          serviceAccountName: jobs-georget-planx-pla-net
          volumes:
              - name: sower-jobs-creds-volume
                secret:
                    secretName: sower-jobs-g3auto
        - action: merge-manifests
          activeDeadlineSeconds: 86400
          container:
              cpu-limit: "1"
              env:
                  - name: GEN3_HOSTNAME
                    valueFrom:
                        configMapKeyRef:
                            key: hostname
