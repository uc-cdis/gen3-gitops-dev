              image: quay.io/cdis/cdis/manifest-merging:2023.05
              memory-limit: 1Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /creds.json
                    name: sower-jobs-creds-volume
                    readOnly: true
