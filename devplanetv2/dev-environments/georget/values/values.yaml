sower:
    enabled: false
    externalSecrets:
        pelicanserviceG3auto: georget-pelicanservice-g3auto
        sowerjobsG3auto: georget-sower-jobs-g3auto
    image:
        repository: quay.io/cdis/sower
        tag: "2026.02"
    sowerConfig:
        - action: export
          container:
              cpu-limit: "1"
              env:
                  - name: DICTIONARY_URL
                    valueFrom:
                        configMapKeyRef:
                            key: dictionary_url
                            name: manifest-global
                  - name: GEN3_HOSTNAME
                    valueFrom:
                        configMapKeyRef:
                            key: hostname
                            name: manifest-global
                  - name: ROOT_NODE
                    value: case
              image: quay.io/cdis/pelican-export:master
              memory-limit: 4Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /pelican-creds.json
                    name: pelican-creds-volume
                    readOnly: true
                    subPath: config.json
                  - mountPath: /peregrine-creds.json
                    name: peregrine-creds-volume
                    readOnly: true
                    subPath: creds.json
          name: pelican-export
          restart_policy: Never
          volumes:
              - name: pelican-creds-volume
                secret:
                    secretName: pelicanservice-g3auto
              - name: peregrine-creds-volume
                secret:
                    secretName: peregrine-creds
        - action: import
          container:
              cpu-limit: "1"
              env:
                  - name: DICTIONARY_URL
                    valueFrom:
                        configMapKeyRef:
                            key: dictionary_url
                            name: manifest-global
                  - name: GEN3_HOSTNAME
                    valueFrom:
                        configMapKeyRef:
                            key: hostname
                            name: manifest-global
              image: quay.io/cdis/pelican-import:master
              memory-limit: 4Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /sheepdog-creds.json
                    name: sheepdog-creds-volume
                    readOnly: true
                    subPath: creds.json
          name: pelican-import
          restart_policy: Never
          volumes:
              - name: sheepdog-creds-volume
                secret:
                    secretName: sheepdog-creds
        - action: ingest-metadata-manifest
          activeDeadlineSeconds: 86400
          container:
              cpu-limit: "1"
              env:
                  - name: GEN3_HOSTNAME
                    valueFrom:
                        configMapKeyRef:
                            key: hostname
                            name: manifest-global
              image: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/metadata-manifest-ingestion:2023.05
              memory-limit: 1Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /creds.json
                    name: creds-volume
                    readOnly: true
                    subPath: creds.json
          name: ingest-metadata-manifest
          restart_policy: Never
          serviceAccountName: jobs-georget-planx-pla-net
          volumes:
              - name: creds-volume
                secret:
                    secretName: sower-jobs-g3auto
        - action: get-dbgap-metadata
          container:
              cpu-limit: "1"
              env:
                  - name: DBGAP_STUDY_ENDPOINT
                    value: https://cdis-presigned-url-test.s3.amazonaws.com/test-dbgap-mock-study.xml
              image: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/get-dbgap-metadata:2023.05
              memory-limit: 1Gi
              name: job-task
              pull_policy: Always
              volumeMounts:
                  - mountPath: /creds.json
                    name: creds-volume
                    readOnly: true
                    subPath: creds.json
          name: get-dbgap-metadata
          restart_policy: Never
          serviceAccountName: jobs-georget-planx-pla-net
          volumes:
              - name: creds-volume
                secret:
                    secretName: sower-jobs-g3auto
        - action: index-object-manifest
