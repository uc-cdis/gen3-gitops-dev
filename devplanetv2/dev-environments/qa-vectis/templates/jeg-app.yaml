apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qa-vectis-jeg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Deploy JEG after workspace-proxy (which creates the shared namespace).
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - path: devplanetv2/dev-environments/qa-vectis/charts/jeg
      repoURL: https://github.com/uc-cdis/gen3-gitops-dev.git
      targetRevision: {{ .Values.gitopsBranch }}
      helm:
        releaseName: jupyter-enterprise-gateway
        valueFiles:
          - $values/devplanetv2/dev-environments/qa-vectis/values/jeg-values.yaml
    - repoURL: https://github.com/uc-cdis/gen3-gitops-dev.git
      targetRevision: {{ .Values.gitopsBranch }}
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: jupyter-pods-qa-vectis
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
