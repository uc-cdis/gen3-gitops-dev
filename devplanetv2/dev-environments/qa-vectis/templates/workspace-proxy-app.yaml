apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qa-vectis-workspace-proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Deploy workspace-proxy after gen3 core services are up.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - path: devplanetv2/dev-environments/qa-vectis/charts/workspace-proxy
      repoURL: https://github.com/uc-cdis/gen3-gitops-dev.git
      targetRevision: {{ .Values.gitopsBranch }}
      helm:
        releaseName: workspace-proxy
        valueFiles:
          - $values/devplanetv2/dev-environments/qa-vectis/values/workspace-proxy-values.yaml
    - repoURL: https://github.com/uc-cdis/gen3-gitops-dev.git
      targetRevision: {{ .Values.gitopsBranch }}
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    # ArgoCD uses qa-vectis as default namespace; templates with
    # explicit namespace metadata target jupyter-pods-qa-vectis.
    namespace: qa-vectis
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
