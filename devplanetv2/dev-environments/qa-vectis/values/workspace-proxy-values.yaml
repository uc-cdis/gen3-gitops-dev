# Overrides for the workspace-proxy sub-chart (nested under 'workspace-proxy:' so gen3 parent passes them through).

workspace-proxy:
  enabled: true
  deploymentNamespace: qa-vectis
  workspaceNamespace: jupyter-pods-qa-vectis
  kubernetesApiServerCIDRs:
    - "10.100.0.1/32"       # kubernetes ClusterIP (pre-DNAT)
    - "172.27.135.127/32"  # EKS control plane endpoint (post-DNAT)
    - "172.27.137.189/32"  # EKS control plane endpoint (post-DNAT)

  replicaCount: 1

  image:
    repository: quay.io/cdis/gen3-vectis
    tag: qa-goproxy
    pullPolicy: Always

  listenAddr: ":8080"
  jegKernelSpecPolicy: ""

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  networkPolicy:
    enabled: true
