# Overrides for the workspace-proxy sub-chart (nested under 'workspace-proxy:' so gen3 parent passes them through).

workspace-proxy:
  enabled: true
  deploymentNamespace: qa-vectis
  workspaceNamespace: jupyter-pods-qa-vectis
  kubernetesApiServerCIDRs:
    - "10.100.0.1/32"       # kubernetes ClusterIP (pre-DNAT)
    - "172.27.140.0/22"     # EKS private subnet (DHCP)
    - "172.27.136.0/22"     # EKS private subnet (DHCP)
    - "172.27.132.0/22"     # EKS private subnet (DHCP)

  replicaCount: 1

  image:
    repository: quay.io/cdis/gen3-vectis
    tag: qa-goproxy
    pullPolicy: Always

  listenAddr: ":8080"
  jegKernelSpecPolicy: |
    {
      "allowedSpecs": [
        "python_kubernetes",
        "python_tf_kubernetes",
        "python_tf_gpu_kubernetes"
      ],
      "displayNames": {
        "python_kubernetes": "Python on Kubernetes",
        "python_tf_kubernetes": "Python + TensorFlow",
        "python_tf_gpu_kubernetes": "Python + TensorFlow + GPU"
      }
    }

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  networkPolicy:
    enabled: true
