# Overrides for the JEG sub-chart (nested under 'jeg:' so gen3 parent passes them through).

jeg:
  enabled: true
  workspaceNamespace: jupyter-pods-qa-vectis

  replicaCount: 1

  image:
    repository: quay.io/cdis/gen3-vectis
    tag: "qa-jegv2"
    pullPolicy: Always

  env:
    # CRITICAL: must match hatchery user-namespace and workspace-proxy WORKSPACE_NAMESPACE.
    EG_NAMESPACE: jupyter-pods-qa-vectis
    EG_KERNEL_LAUNCH_TIMEOUT: "120"
    EG_MAX_KERNELS_PER_USER: "2"
    EG_CULL_IDLE_TIMEOUT: "14400"
    EG_CULL_CONNECTED: "True"
    EG_AUTH_TOKEN: ""
    EG_DEFAULT_KERNEL_NAME: python_kubernetes
    EG_LIST_KERNELS: "True"
    EG_KERNEL_IMAGE_PULL_POLICY: IfNotPresent
    EG_KERNEL_WHITELIST_ENVS: "ACCESS_TOKEN,API_KEY_ID,API_KEY,GEN3_API_KEY_ID,GEN3_API_KEY_SECRET,GEN3_ENDPOINT,NAMESPACE"
    EG_SHARED_NAMESPACE: "True"
    EG_MIRROR_WORKING_DIRS: "False"

  kernelPodTemplate:
    enabled: true
    name: jeg-kernel-pod-template
    fileName: kernel-pod.yaml.j2
    mountPath: /usr/local/share/jupyter/kernels/python_kubernetes/scripts/kernel-pod.yaml.j2
    workspaceMountPath: /home/jovyan/pd
    volumeName: workspace-data
    sidecar:
      name: gen3-fuse
      image: quay.io/cdis/gen3fuse-sidecar:master
      gen3Endpoint: https://qa-vectis.planx-pla.net
      hostname: qa-vectis.planx-pla.net
      command:
        - /bin/bash
        - /sidecarDockerrun.sh
      namespace: qa-vectis
      hostnameConfigMapName: global
      hostnameConfigMapKey: hostname
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
