hatchery:
  externalSecrets:
    createK8sStataSecret: true
  resources:
    requests:
      memory: "105Mi"
      cpu: "15m"
  image:
    tag: master
  hatchery:
    json: |-
      {
        "pricing": {
          "cpu": 0.04048,
          "memory": 0.004445
        },
        "user-namespace": "jupyter-pods-qa-vectis",
        "sub-dir": "/lw-workspace",
        "user-volume-size": "10Gi",
        "default-pay-model": {
          "local": true,
          "workspace_type": "Trial Workspace",
          "hard-limit": 5,
          "soft-limit": 4
        },
        "pay-models": [],
        "jeg-gateway-proxy-url": "http://workspace-proxy-service.qa-vectis.svc.cluster.local:8080/jeg-proxy",
        "sidecar": {
          "cpu-limit": "1.0",
          "memory-limit": "256Mi",
          "image": "quay.io/cdis/ecs-ws-sidecar:master",
          "env": {
            "NAMESPACE": "qa-vectis",
            "HOSTNAME": "qa-vectis.planx-pla.net"
          },
          "args": [],
          "command": ["/bin/bash", "./sidecar.sh"],
          "lifecycle-pre-stop": ["/bin/bash", "-c", "fusermount -u /data || true"]
        },
        "containers": [
          {
            "target-port": 8888,
            "cpu-limit": "500m",
            "memory-limit": "2Gi",
            "name": "Jupyter Notebook (Python 3) - micro-notebook-dev",
            "image": "quay.io/cdis/jupyterlab-generic:master",
            "env": {
              "FRAME_ANCESTORS": "https://qa-vectis.planx-pla.net",
              "PATH": "/opt/conda/bin:/home/jovyan/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            },
            "command": ["/jupyterlab-start.sh"],
            "args": [
              "--ServerApp.base_url=/lw-workspace/proxy/",
              "--ServerApp.default_url=/lab",
              "--ServerApp.password=''",
              "--ServerApp.token=''",
              "--ServerApp.disable_check_xsrf=True",
              "--ServerApp.allow_origin='https://qa-vectis.planx-pla.net'",
              "--ServerApp.root_dir='/home/jovyan'",
              "--ServerApp.shutdown_no_activity_timeout=5400"
            ],
            "path-rewrite": "/lw-workspace/proxy/",
            "use-tls": "false",
            "ready-probe": "/lw-workspace/proxy/",
            "lifecycle-post-start": [
              "/bin/sh",
              "-c",
              "ln -sfn /data /home/jovyan/data; true"
            ],
            "user-uid": 1000,
            "fs-gid": 100,
            "user-volume-location": "/home/jovyan",
            "gen3-volume-location": "/home/jovyan/.gen3"
          }
        ]
      }

