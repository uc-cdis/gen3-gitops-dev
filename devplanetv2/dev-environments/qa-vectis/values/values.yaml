revproxy:
  resources:
    requests:
      memory: "105Mi"
      cpu: "15m"
  ingress:
    aws:
      # Do not change- this will break DNS for your env.
      group: devplanetv2
  additionalConfigs:
    guppy-service.conf: |-
      location /guppy/ {
          # No nginx CSRF check here: API Gateway enforces its own auth via Lambda authorizer.
          # Bypass VPC Private DNS for execute-api; resolve through public resolvers.
          proxy_set_header   Authorization "$access_token";
          set $proxy_service  "guppy";
          proxy_ssl_server_name on;
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          rewrite ^/guppy/(.*) /search/$1 break;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
    siem-service.conf: |-
      location /siem/ {
          if ($csrf_check !~ ^ok-\S.+$) {
            return 403 "failed csrf check";
          }
          set $proxy_service  "siem";
          set $upstream http://siem-service.qa-vectis.svc.cluster.local:8000;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
    metadata-service.conf: |-
      location /mds/ {
          # Bypass VPC Private DNS for execute-api; resolve through public resolvers.
          # No nginx CSRF check here: API Gateway enforces its own auth via Lambda authorizer.
          proxy_set_header   Authorization "$access_token";
          set $proxy_service  "mds";
          proxy_ssl_server_name on;
          # /mds routes are served by the search Lambda via API Gateway.
          # /mds/_status is explicitly unauthenticated in route config.
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
      
      location /mds-admin/ {
          if ($csrf_check !~ ^ok-\S.+$) {
            return 403 "failed csrf check";
          }
          set $authz_resource "/mds_gateway";
          set $authz_method "access";
          set $authz_service "mds_gateway";
          # be careful - sub-request runs in same context as this request
          auth_request /gen3-authz;
          
          set $mds_password "Basic ${mds_b64}";
          
          set $proxy_service  "metadata-service";
          set $upstream http://metadata-service$des_domain;
          rewrite ^/mds-admin/(.*) /$1 break;
          proxy_set_header   Host $host;
          proxy_set_header   X-Forwarded-For "$realip";
          proxy_set_header   X-UserId "$userid";
          proxy_set_header   X-SessionId "$session_id";
          proxy_set_header   X-VisitorId "$visitor_id";
          proxy_set_header   Authorization "$mds_password";
          
          proxy_pass $upstream;
          proxy_redirect http://$host/ https://$host/mds-admin/;
          client_max_body_size 0;
      }
    snapshots-service.conf: |-
      location /snapshots/ {
          return 404;
      }
    ambassador-service.conf: |-
      location = /lw-workspace/proxy {
        return 308 $scheme://$http_host/lw-workspace/proxy/;
      }

      location /lw-workspace/proxy/ {
          set $authz_resource "/workspace";
          set $authz_method "access";
          set $authz_service "jupyterhub";
          auth_request_set $remoteUser $upstream_http_REMOTE_USER;
          auth_request_set $saved_set_cookie $upstream_http_set_cookie;
          auth_request /gen3-authz;

          if ($saved_set_cookie != "") {
              add_header Set-Cookie $saved_set_cookie always;
          }
          add_header Cache-Control "no-store";

          proxy_set_header REMOTE_USER $remoteUser;
          error_page 403 = @errorworkspace;

          set $proxy_service  "workspace-proxy";
          set $upstream http://workspace-proxy-service.$namespace.svc.cluster.local:8080;
          rewrite ^/lw-workspace/proxy/$ /lab break;
          rewrite ^/lw-workspace/proxy/(.*) /$1 break;
          proxy_pass $upstream;
          proxy_redirect http://$host/ https://$host/lw-workspace/proxy/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-URL-SCHEME https;
          client_max_body_size 0;
          proxy_read_timeout 36000s;
      }
    lambda-indexd.conf: |-
      location /api/v0/indexd/ {
          # Bypass VPC Private DNS for execute-api; resolve through public resolvers.
          proxy_set_header   Authorization "$access_token";
          proxy_ssl_server_name on;
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          rewrite ^/api/v0/indexd/(.*) /indexd/$1 break;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
    lambda-drs.conf: |-
      location ^~ /user/ga4gh/drs/v1/ {
          # Bypass VPC Private DNS for execute-api; resolve through public resolvers.
          if ($csrf_check !~ ^ok-\S.+$) {
            return 403 "failed csrf check";
          }
          proxy_set_header   Authorization "$access_token";
          proxy_ssl_server_name on;
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          rewrite ^/user/ga4gh/drs/v1/(.*) /drs/v1/$1 break;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
      location ^~ /ga4gh/drs/v1/ {
          # Bypass VPC Private DNS for execute-api; resolve through public resolvers.
          if ($csrf_check !~ ^ok-\S.+$) {
            return 403 "failed csrf check";
          }
          proxy_set_header   Authorization "$access_token";
          proxy_ssl_server_name on;
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          rewrite ^/ga4gh/drs/v1/(.*) /drs/v1/$1 break;
          proxy_pass $upstream;
          client_max_body_size 0;
      }
    lambda-dictionary.conf: |-
      location ~* ^/api/v0/submission/_dictionary/_all/?$ {
          proxy_ssl_server_name on;
          set $upstream https://gen3-qa-vectis-config.s3.us-east-1.amazonaws.com;
          proxy_set_header Host gen3-qa-vectis-config.s3.us-east-1.amazonaws.com;
          rewrite ^ /dictionary/schema.json break;
          proxy_pass $upstream;
      }
    lambda-query.conf: |-
      location ~* ^/graphql/?$ {
        # Query page issues same-origin /graphql requests with browser preflight.
        if ($request_method = 'OPTIONS') {
          add_header Access-Control-Allow-Origin $http_origin always;
          add_header Access-Control-Allow-Credentials true always;
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-CSRFToken, X-Requested-With" always;
          add_header Access-Control-Max-Age 86400 always;
          add_header Content-Length 0;
          add_header Content-Type text/plain;
          return 204;
        }
        proxy_set_header   Authorization "$access_token";
          proxy_ssl_server_name on;
          set $upstream https://qa-vectis-api.planx-pla.net;
          proxy_set_header Host qa-vectis-api.planx-pla.net;
          rewrite ^/graphql/?$ /query/vectis/graphql break;
          proxy_pass $upstream;
          add_header Access-Control-Allow-Origin $http_origin always;
          add_header Access-Control-Allow-Credentials true always;
          client_max_body_size 0;
      }

      location ~* ^/api/v0/submission/vectis/graphql/?$ {
