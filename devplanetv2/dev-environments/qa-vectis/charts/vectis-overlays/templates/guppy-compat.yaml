{{- if .Values.guppyCompat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guppy-compat-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.guppyCompat.replicaCount }}
  selector:
    matchLabels:
      app: guppy-compat-service
  template:
    metadata:
      labels:
        app: guppy-compat-service
    spec:
      containers:
      - name: guppy-compat-service
        image: "{{ .Values.guppyCompat.image.repository }}:{{ .Values.guppyCompat.image.tag }}"
        imagePullPolicy: {{ .Values.guppyCompat.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: SEARCH_BASE
          value: "{{ .Values.guppyCompat.env.SEARCH_BASE }}"
        - name: GUPPY_COMPAT_MAX_LIMIT
          value: "{{ .Values.guppyCompat.env.GUPPY_COMPAT_MAX_LIMIT }}"
        - name: ARBORIST_URL
          value: "{{ .Values.guppyCompat.env.ARBORIST_URL }}"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
{{ toYaml .Values.guppyCompat.resources | indent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: guppy-compat-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: guppy-compat-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
{{- end }}
