namespace: qa-vectis

guppyCompat:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: guppy-compat-service
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    SEARCH_BASE: "http://search-auth-proxy.qa-vectis.svc.cluster.local:8000/search"
    GUPPY_COMPAT_MAX_LIMIT: "5000"
    ARBORIST_URL: "http://arborist-service.qa-vectis.svc.cluster.local"

siemService:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: siem-service
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    SEARCH_BASE: "http://search-auth-proxy.qa-vectis.svc.cluster.local:8000/search"
    ARBORIST_URL: "http://arborist-service.qa-vectis.svc.cluster.local"
    SIEM_DEFAULT_LIMIT: "250"
    SIEM_MAX_LIMIT: "2000"

searchAuthProxy:
  enabled: true
  replicaCount: 1
  serviceName: search-auth-proxy
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: search-auth-proxy-service
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    SEARCH_PROXY_DEFAULT_LIMIT: "50"
    SEARCH_PROXY_MAX_LIMIT: "1000"
  postgresDsnSecretRef:
    name: vectis-search-auth-proxy
    key: postgres_dsn

# CDK RDS secret in Secrets Manager — used to build the postgres DSN ExternalSecret
rds:
  secretName: RdsSecretB4544A18-GrJ4o16zGYiT-kHI7Yl
  endpoint: gen3-qa-vectis-rdscluster7e964c7d-lqk85dtnbh5j.cluster-cwvizkxhzjt8.us-east-1.rds.amazonaws.com
  port: "5432"
  database: postgres
